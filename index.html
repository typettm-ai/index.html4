<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CarQR β v0.1</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    font-family:Arial, sans-serif;
    background:#f5f5f5;
}

.container{
    max-width:700px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#1565C0;
    margin-bottom:10px;
}

p{
    text-align:center;
    color:#666;
}

label{
    display:block;
    margin-top:20px;
    font-weight:bold;
}

select,
input[type=file]{
    width:100%;
    padding:12px;
    margin-top:8px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    margin-top:20px;
    padding:15px;
    font-size:16px;
    background:#1976D2;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#0D47A1;
}

#preview{
    margin-top:25px;
    text-align:center;
}

#preview img{
    max-width:100%;
    border-radius:10px;
    display:none;
    border:1px solid #ddd;
}

#status{
    margin-top:20px;
    padding:15px;
    background:#eef5ff;
    border-radius:10px;
    text-align:center;
}
</style>

</head>

<body>

<div class="container">

<h1>🚗 CarQR β v0.1</h1>

<p>画像表示テスト版</p>

<label>書類の種類</label>

<select id="documentType">
    <option>車検証</option>
    <option>登録識別情報等通知書</option>
    <option>予備検査証（準備中）</option>
</select>

<label>画像を選択</label>

<input type="file" id="imageInput" accept="image/*">

<button onclick="showImage()">
画像を表示する
</button>

<div id="status">
画像を選択してください。
</div>

<div id="preview">
    <img id="imagePreview">
</div>

</div>

<script>

function showImage(){

    const input = document.getElementById("imageInput");
    const file = input.files[0];

    if(!file){
        alert("画像を選択してください。");
        return;
    }

    const reader = new FileReader();

    reader.onload = function(e){

        document.getElementById("imagePreview").src = e.target.result;
        document.getElementById("imagePreview").style.display="block";

        document.getElementById("status").innerHTML =
        "✅ 画像を読み込みました。<br>次のバージョンでQRコード解析を追加します。";

    }

    reader.readAsDataURL(file);

}

</script>

</body>
</html>
