<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>車検証QR Reader β</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,.15);
}

h1{
text-align:center;
color:#1565c0;
}

button{
width:100%;
padding:15px;
margin:10px 0;
font-size:18px;
background:#1976d2;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#0d47a1;
}

#reader{
width:100%;
margin-top:20px;
}

textarea{
width:100%;
height:250px;
margin-top:20px;
font-size:14px;
padding:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>📷 車検証QR Reader β</h1>

<button onclick="startCamera()">
カメラで読み取る
</button>

<input type="file" id="imageFile" accept="image/*">

<div id="reader"></div>

<textarea id="result" placeholder="QRコードの内容が表示されます"></textarea>

<button onclick="copyResult()">
コピー
</button>

</div>

<script>

let qr;

function startCamera(){

qr = new Html5Qrcode("reader");

qr.start(
{ facingMode:"environment" },
{
fps:10,
qrbox:250
},
onScanSuccess
);

}

function onScanSuccess(decodedText){

document.getElementById("result").value=decodedText;

qr.stop();

}

document.getElementById("imageFile").addEventListener("change",function(e){

const file=e.target.files[0];

if(!file)return;

const html5QrCode=new Html5Qrcode("reader");

html5QrCode.scanFile(file,true)
.then(decodedText=>{
document.getElementById("result").value=decodedText;
})
.catch(err=>{
alert("QRコードを読み取れませんでした");
});

});

function copyResult(){

navigator.clipboard.writeText(
document.getElementById("result").value
);

alert("コピーしました");

}

</script>

</body>
</html>
